{% extends "base.html" %}

{% block title %}
Sign Up
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Create Account</h2>

        <p class="sub-text">
            Start your AI career journey
        </p>

        <form method="POST">

            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            <label for="email">
                Email
            </label>

            <input
                id="email"
                type="email"
                name="email"
                placeholder="Enter your email"
                value="{{ request.form.get('email', '') }}"
                autocomplete="email"
                required
            >

            <label for="password">
                Password
            </label>

            <input
                id="password"
                type="password"
                name="password"
                placeholder="Create a password"
                minlength="6"
                autocomplete="new-password"
                required
            >

            <p class="sub-text">
                Use at least 6 characters
            </p>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <p class="switch-auth">

            Already have an account?

            <a href="{{ url_for('login') }}">
                Login
            </a>

        </p>

    </div>

</div>

{% endblock %}
